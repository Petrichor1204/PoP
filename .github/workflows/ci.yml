name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linter
        run: pip install flake8==7.1.0

      - name: Run flake8
        run: flake8 .

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint          # only run tests if lint passes

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q
        env:
          # Ensures no real .env is needed — tests use a temp SQLite DB
          FLASK_SECRET_KEY: test-secret-key-ci
          GEMINI_API_KEY: dummy
          TMDB_API_KEY: dummy
          GOOGLE_BOOKS_API_KEY: dummy
