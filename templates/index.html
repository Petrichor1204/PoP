{% extends "base.html" %}

{% block title %}Home - Pick or Pass{% endblock %}

{% block content %}
    <h1>Pick or Pop</h1>
    <!-- Title Evaluation Section -->
    <section>
        <h2>Evaluate a Title</h2>
    <form id="evaluationForm">
        <label for="itemName">Title:</label><br>
        <input type="text" id="itemName" name="item_name" required><br><br>

        <label for="itemType">Type:</label><br>
        <select id="itemType" name="item_type">
            <option value="movie">Movie</option>
            <option value="book">Book</option>
        </select><br><br>

        <button type="submit">Get Recommendation</button>
    </form>

    </section>

    <!-- Decision Result Section -->
    <section id="decisionResult" style="display: none;">
        <h2>Decision Result</h2>
        <div id="verdict"></div>
        <div id="confidence"></div>
        <div id="reasoning"></div>
        <div id="mismatches"></div>
    </section>
    <script>
        async function handleEvaluation(event) {
            event.preventDefault();

            const itemName = document.getElementById('itemName').value;
            const itemType = document.getElementById('itemType').value;
            const submitBtn = event.target.querySelector('button');

            // Loading State: Professional touch for your GitHub
            submitBtn.disabled = true;
            submitBtn.innerText = "Analyzing...";

            try {
                const response = await fetch('/decide', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        item_name: itemName,
                        item_type: itemType
                    })
                });

                const data = await response.json();

                if (response.ok && data.data) {
                    displayDecision(data.data);
                } else {
                    alert('Error: ' + (data.message || 'Unknown error'));
                }

            } catch (error) {
                alert('Error submitting decision: ' + error.message);
            } finally {
            // Re-enable the button
            submitBtn.disabled = false;
            submitBtn.innerText = "Get Recommendation";
            }
        }
        function displayDecision(result) {
            const resultSection = document.getElementById('decisionResult');
            const verdictDiv = document.getElementById('verdict');
            const confidenceDiv = document.getElementById('confidence');
            const reasoningDiv = document.getElementById('reasoning');
            const mismatchesDiv = document.getElementById('mismatches');

            verdictDiv.innerHTML = `<strong>Verdict:</strong> ${result.verdict}`;
            confidenceDiv.innerHTML = `<strong>Confidence:</strong> ${(result.confidence * 100).toFixed(1)}%`;
            reasoningDiv.innerHTML = `<strong>Reasoning:</strong> ${result.reasoning}`;

            let mismatchesHTML = '<strong>Potential Concerns:</strong>';

            if (result.potential_mismatches && result.potential_mismatches.length > 0) {
                mismatchesHTML += '<ul>';
                result.potential_mismatches.forEach(mismatch => {
                    mismatchesHTML += `<li>${mismatch}</li>`;
                });
                mismatchesHTML += '</ul>';
            } else {
                mismatchesHTML += '<p>None</p>';
            }

            mismatchesDiv.innerHTML = mismatchesHTML;
            resultSection.style.display = 'block';
        }
        // This tells the browser: "When the evaluationForm is submitted, run handleEvaluation"
        document.getElementById('evaluationForm').addEventListener('submit', handleEvaluation);
    </script>
{% endblock %}
