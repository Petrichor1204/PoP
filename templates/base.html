<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pick or Pass{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap');

        :root {
            --blue-900: #0b1b33;
            --blue-800: #112445;
            --blue-100: #e8edf6;
            --white: #ffffff;
            --text: #0b1b33;
            --muted: #5b6b86;
            --warn-bg: #fff4e5;
            --warn-text: #8a5a00;
            --warn-border: #f0d6a8;
            --success-bg: #e9f7ef;
            --success-text: #1e6b3a;
            --success-border: #bfe6cf;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            background: var(--blue-100);
            color: var(--text);
        }
        nav {
            background: var(--blue-900);
            color: var(--white);
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
        }
        nav a {
            color: var(--white);
            margin-right: 16px;
            text-decoration: none;
            font-weight: 600;
        }
        nav a:hover { text-decoration: underline; }

        .content {
            max-width: 820px;
            margin: auto;
            padding: 0 20px 40px;
        }
        section {
            background: var(--white);
            border: 1px solid #dbe3f0;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 24px;
        }
        h1, h2, h3 {
            margin: 0 0 12px;
            color: var(--blue-900);
            letter-spacing: 0.2px;
        }
        h1 { font-size: 28px; }
        h2 { font-size: 20px; }
        h3 { font-size: 16px; text-transform: uppercase; color: var(--muted); }
        p { margin: 0 0 10px; color: var(--text); }
        label { font-weight: 600; color: var(--blue-900); }
        input[type="text"], select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cfd8e6;
            border-radius: 8px;
            margin-top: 6px;
            margin-bottom: 12px;
        }
        button {
            background: var(--blue-800);
            color: var(--white);
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        .status-message {
            padding: 10px 12px;
            border-radius: 6px;
            margin: 12px 0;
            font-weight: 600;
            border: 1px solid transparent;
        }
        .status-error {
            background: var(--warn-bg);
            color: var(--warn-text);
            border-color: var(--warn-border);
        }
        .status-success {
            background: var(--success-bg);
            color: var(--success-text);
            border-color: var(--success-border);
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/settings">Preferences</a>
        <a href="/past-decisions">History</a>
    </nav>

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
