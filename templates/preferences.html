{% extends "base.html" %}
{% block title %}Preferences – Pick or Pass{% endblock %}

{% block content %}

<div class="auth-wrapper" style="max-width:560px;">
    <div class="page-card">

        <h1>Your Preferences</h1>
        <p class="subtitle">These shape every recommendation and evaluation.</p>

        <div id="statusMessage" class="status-message" style="display:none;"></div>

        <form id="preferencesForm">

            <label for="likes">Genres &amp; themes you enjoy</label>
            <input type="text" id="likes" name="likes"
                   placeholder="e.g. sci-fi, thriller, slow burn, romance">

            <label for="dislikes">Things you want to avoid</label>
            <input type="text" id="dislikes" name="dislikes"
                   placeholder="e.g. gore, jump scares, sad endings">

            <div class="prefs-row">
                <div class="prefs-col">
                    <label for="pace">Preferred pace</label>
                    <select id="pace" name="pace">
                        <option value="slow">🐢 Slow</option>
                        <option value="medium" selected>⚡ Medium</option>
                        <option value="fast">🚀 Fast</option>
                    </select>
                </div>
                <div class="prefs-col">
                    <label for="emotional_tolerance">Emotional intensity</label>
                    <select id="emotional_tolerance" name="emotional_tolerance">
                        <option value="light">😌 Light</option>
                        <option value="moderate" selected>😐 Moderate</option>
                        <option value="heavy">😭 Heavy</option>
                    </select>
                </div>
            </div>

            <label for="goal">Why do you watch / read?</label>
            <select id="goal" name="goal">
                <option value="relax">😴 Relax &amp; unwind</option>
                <option value="think">🧠 Think &amp; reflect</option>
                <option value="escape">🌍 Escape into another world</option>
            </select>

            <div class="form-actions" style="margin-top:4px;">
                <button type="submit" class="btn btn-green">💾 Save Preferences</button>
                <a class="btn btn-outline" href="/">← Back to Home</a>
            </div>
        </form>

    </div>
</div>

<style>
    .prefs-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
    }
    .prefs-col label { margin-bottom: 5px; }
    .prefs-col select { margin-bottom: 0; }
    @media (max-width: 480px) {
        .prefs-row { grid-template-columns: 1fr; }
    }
</style>

<script>
    async function loadPreferences() {
        try {
            const resp = await fetch('/preferences');
            const json = await resp.json();
            if (!resp.ok) return;
            const p = json.data;
            const f = document.getElementById('preferencesForm');
            f.querySelector('[name="likes"]').value               = (p.likes    || []).join(', ');
            f.querySelector('[name="dislikes"]').value            = (p.dislikes || []).join(', ');
            f.querySelector('[name="pace"]').value                = p.pace                || 'medium';
            f.querySelector('[name="emotional_tolerance"]').value = p.emotional_tolerance || 'moderate';
            f.querySelector('[name="goal"]').value                = p.goal               || 'relax';
        } catch(_) {}
    }

    document.getElementById('preferencesForm').addEventListener('submit', async e => {
        e.preventDefault();
        const statusEl = document.getElementById('statusMessage');
        statusEl.style.display = 'none';

        const f = document.getElementById('preferencesForm');
        const payload = {
            likes:                f.querySelector('[name="likes"]').value,
            dislikes:             f.querySelector('[name="dislikes"]').value,
            pace:                 f.querySelector('[name="pace"]').value,
            emotional_tolerance:  f.querySelector('[name="emotional_tolerance"]').value,
            goal:                 f.querySelector('[name="goal"]').value,
        };

        try {
            const resp = await fetch('/preferences', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload),
            });
            const json = await resp.json();
            if (!resp.ok) {
                statusEl.className   = 'status-message status-error';
                statusEl.textContent = (json.error && json.error.message) || 'Error saving preferences.';
            } else {
                statusEl.className   = 'status-message status-success';
                statusEl.textContent = '✅ Preferences saved!';
            }
            statusEl.style.display = 'block';
        } catch(err) {
            statusEl.className   = 'status-message status-error';
            statusEl.textContent = 'Network error: ' + err.message;
            statusEl.style.display = 'block';
        }
    });

    loadPreferences();
</script>

{% endblock %}
