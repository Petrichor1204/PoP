{% extends "base.html" %}

{% block title %}Settings - Pick or Pass{% endblock %}

{% block content %}
      <!-- User Preferences Section -->
    <section>
        <h2>Your Preferences</h2>
        {% if save_error %}
        <div style="color: red; margin-bottom: 20px;">{{ save_error }}</div>
        {% endif %}
        <div id="statusMessage" class="status-message" style="display: none;"></div>
        <form id="preferencesForm" method="POST">
            <label>Genres you like</label>
            <input type="text" name="likes">

            <label>Genres you dislike</label>
            <input type="text" name="dislikes">

            <label>Preferred pace</label>
            <select name="pace">
                <option value="slow">Slow</option>
                <option value="medium">Medium</option>
                <option value="fast">Fast</option>
            </select>

            <label>Emotional tolerance</label>
            <select name="emotional_tolerance">
                <option value="light">Light</option>
                <option value="moderate">Moderate</option>
                <option value="heavy">Heavy</option>
            </select>

            <label>Why do you consume media?</label>
            <select name="goal">
                <option value="relax">Relax</option>
                <option value="think">Think</option>
                <option value="escape">Escape</option>
            </select>

            <button type="submit">Save Preferences</button>
        </form>
        <p style="margin-top: 12px;">
            <a href="/">Go to Evaluate a Title</a>
        </p>
    </section>
    
    <script>
        async function loadPreferences() {
            const status = document.getElementById('statusMessage');
            try {
                const response = await fetch('/preferences');
                const data = await response.json();
                if (!response.ok) {
                    status.className = "status-message status-error";
                    status.innerText = (data.error && data.error.message) || 'No saved preferences yet.';
                    status.style.display = "block";
                    return;
                }
                const prefs = data.data;
                const form = document.getElementById('preferencesForm');
                form.querySelector('[name="likes"]').value = (prefs.likes || []).join(', ');
                form.querySelector('[name="dislikes"]').value = (prefs.dislikes || []).join(', ');
                form.querySelector('[name="pace"]').value = prefs.pace || 'medium';
                form.querySelector('[name="emotional_tolerance"]').value = prefs.emotional_tolerance || 'moderate';
                form.querySelector('[name="goal"]').value = prefs.goal || 'relax';
                status.style.display = "none";
            } catch (error) {
                status.className = "status-message status-error";
                status.innerText = 'Error loading preferences: ' + error.message;
                status.style.display = "block";
            }
        }

        document.getElementById('preferencesForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const status = document.getElementById('statusMessage');
            status.style.display = "none";

            const preferencesForm = document.getElementById('preferencesForm');
            const preferences = {
                likes: preferencesForm.querySelector('[name="likes"]').value,
                dislikes: preferencesForm.querySelector('[name="dislikes"]').value,
                pace: preferencesForm.querySelector('[name="pace"]').value,
                emotional_tolerance: preferencesForm.querySelector('[name="emotional_tolerance"]').value,
                goal: preferencesForm.querySelector('[name="goal"]').value
            };
            try {
                const response = await fetch('/preferences', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json'},
                    body: JSON.stringify(preferences)
                });
                const data = await response.json();
                if (!response.ok) {
                    status.className = "status-message status-error";
                    status.innerText = (data.error && data.error.message) || 'Error saving preferences.';
                    status.style.display = "block";
                    return;
                }
                status.className = "status-message status-success";
                status.innerText = 'Preferences saved successfully.';
                status.style.display = "block";
            } catch (error) {
                status.className = "status-message status-error";
                status.innerText = 'Error saving preferences: ' + error.message;
                status.style.display = "block";
            }
        });

        loadPreferences();
    </script>
{% endblock %}
