databases:
  - name: pop-db
    databaseName: pop
    user: pop
    plan: free
    ipAllowList: []   # empty = only allow connections from Render services internally

services:
  # ── Web (Flask) ──────────────────────────────────────────
  - type: web
    name: pop-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: INFO
      - key: FLASK_SECRET_KEY
        generateValue: true        # Render auto-generates a secure random value
      - key: GEMINI_API_KEY
        sync: false                # You paste this in the Render dashboard
      - key: TMDB_API_KEY
        sync: false
      - key: GOOGLE_BOOKS_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pop-db
          property: connectionString
