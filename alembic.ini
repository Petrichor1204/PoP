[alembic]
script_location = migrations
# URL is resolved at runtime via database.get_database_url() in migrations/env.py
# Set DATABASE_URL env var for Postgres; falls back to SQLite for local dev.
sqlalchemy.url = sqlite:///my_database.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
